---
- name: Update and fully upgrade Raspberry Pi OS
  hosts: pis
  become: true
  gather_facts: true

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0

    - name: Perform full system upgrade
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true

    - name: Reboot system after upgrade
      ansible.builtin.reboot:
        msg: "Rebooting after apt full-upgrade"
        reboot_timeout: 600

    - name: Wait for host after reboot
      ansible.builtin.wait_for_connection:
        delay: 30
        timeout: 300
