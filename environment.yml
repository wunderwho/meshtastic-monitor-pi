---
- name: Deploy enclosure environment logger
  hosts: pis
  become: true

  vars:
    monitor_home: "/home/{{ monitor_user }}"
    venv_path: "{{ monitor_home }}/meshtastic-venv"

  tasks:

    - name: Ensure environment log files exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        owner: "{{ monitor_user }}"
        group: "{{ monitor_user }}"
        mode: "0644"
      loop:
        - "{{ monitor_home }}/environment.json"
        - "{{ monitor_home }}/environment.log"

    - name: Deploy environment logger
      ansible.builtin.template:
        src: templates/modules/environment_logger.py.j2
        dest: "{{ monitor_home }}/environment_logger.py"
        owner: "{{ monitor_user }}"
        group: "{{ monitor_user }}"
        mode: "0755"

    - name: Install environment monitoring service
      ansible.builtin.copy:
        dest: /etc/systemd/system/environment-monitor.service
        mode: "0644"
        content: |
          [Unit]
          Description=Enclosure Environment Logger
          After=network.target

          [Service]
          User={{ monitor_user }}
          WorkingDirectory={{ monitor_home }}
          ExecStart={{ venv_path }}/bin/python -u {{ monitor_home }}/environment_logger.py
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start environment monitor
      ansible.builtin.systemd:
        name: environment-monitor
        enabled: true
        state: started
